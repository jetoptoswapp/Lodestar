[plugin]
id = "builtin_core_stages"
name = "Core Requirement Stages"
version = "1.0.0"
description = "PRD / Architecture / Stories 內建 stages + default workflow（M2 完成版）"
host_api = ">=1.0,<2.0"
entry_module = "plugins.builtin_core_stages.register"
requires_plugins = []

# 只宣告貢獻供 loader 預檢 + UI 預覽；真正的 spec 在 register() 建構。
[[contributes.stage]]
id = "prd"
label = "PRD"

[[contributes.stage]]
id = "architecture"
label = "架構"

[[contributes.stage]]
id = "stories"
label = "使用者故事"

[[contributes.workflow]]
id = "default"
label = "Standard Pipeline"
