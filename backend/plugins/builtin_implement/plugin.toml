[plugin]
id = "builtin_implement"
name = "Implementation Agent (async)"
version = "1.0.0"
description = "M5：async 長時實作 agent。runner（claude-cli agentic / mock dry-run）+ tool hooks（擋受保護分支 / 塗黑秘密）。"
host_api = ">=1.0,<2.0"
entry_module = "plugins.builtin_implement.register"
# implement stage 與 delivery_pipeline workflow 引用 prd/architecture/stories，
# 故依賴 builtin_core_stages（loader 拓樸排序保證先載入）。
requires_plugins = ["builtin_core_stages"]

# 宣告貢獻供 loader 預檢 + UI 預覽；真正的 runner / hook / stage 在 register() 建構
[[contributes.runner]]
id = "claude-cli"
label = "Claude Code (agentic)"

[[contributes.runner]]
id = "mock"
label = "Mock Runner (safe dry-run)"

[[contributes.stage]]
id = "implement"
label = "自動實作"

[[contributes.workflow]]
id = "delivery_pipeline"
label = "Delivery Pipeline"
