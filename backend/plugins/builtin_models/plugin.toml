[plugin]
id = "builtin_models"
name = "Built-in Model Adapters"
version = "1.0.0"
description = "Sync one-shot ModelAdapter via CLI：claude-cli / codex-cli / agy-cli"
host_api = ">=1.0,<2.0"
entry_module = "plugins.builtin_models.register"
requires_plugins = []

# 只宣告貢獻，供 loader 預檢 + UI 預覽；真正的 ModelAdapter 在 register() 建構
[[contributes.model_adapter]]
id = "claude-cli"
label = "Claude (claude-cli)"

[[contributes.model_adapter]]
id = "codex-cli"
label = "Codex (codex-cli)"

[[contributes.model_adapter]]
id = "agy-cli"
label = "agy (agy-cli)"
